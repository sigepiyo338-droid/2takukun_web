<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>究極二択くん</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/2takukunico.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="app">
        <section id="menu-page" class="section" style="position: relative;"> <a href="https://sigepiyo338.pythonanywhere.com/2takukun_local.zip" download class="download-link">
               💻 ローカル版(zip)
           </a>
    <h1>究極二択くん</h1>
    <img src="{{ url_for('static', filename='img/2takukun.png') }}" alt="究極二択くん" id="title-image">
        <p>〜 ヒトの価値観を学習中 〜</p>
            <button id="btn-settings" onclick="showSection('personality-page')">あなたについて(最初の設定)</button>
            <button id="btn-start" onclick="startDiagnosis()">2択診断開始！</button>
            <button id="btn-other" onclick="showSection('other-page')">
                その他
                <span class="button-subtext">（質問の投稿などが行えます）</span>
            </button>
    
            <a href="https://x.com/sigepiyo338" target="_blank" rel="noopener noreferrer" class="x-link">
                𝕏 @sigepiyo338
            </a>
        </section>

        <section id="post-page" class="section hidden">
            <h2>各種投稿</h2>
            
            <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <h3>▼ 新しい「二択」を投稿</h3>
                <input type="text" id="new-q-text" placeholder="例：一生夏か、一生冬か？">
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="new-q-a" placeholder="選択肢A">
                    <input type="text" id="new-q-b" placeholder="選択肢B">
                </div>
                <input type="text" id="new-q-author" placeholder="あなたの名前">
                <button onclick="submitPost()">問題を登録</button>
            </div>

            <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                <h3>▼ 新しい「性格」を定義</h3>
                <p style="font-size: 0.7rem;">例：性格名「エゴイスト」、ラベル「エゴ度」</p>
                <input type="text" id="user-p-name" placeholder="性格名">
                <input type="text" id="user-p-label" placeholder="表示ラベル">
                <button onclick="addUserPersonality()" style="background-color: #27ae60;">性格を追加</button>
            </div>

            <button onclick="showSection('other-page')" style="background-color: #95a5a6;">戻る</button>
        </section>

        <section id="other-page" class="section hidden">
            <h2>その他</h2>
            <button id="btn-post-other" onclick="showSection('post-page')">各種投稿</button>
            <button onclick="showSection('menu-page')" style="background-color: #95a5a6;">戻る</button>
        </section>

        <section id="personality-page" class="section hidden">
            <h2>設定</h2>
            お名前
            <input type="text" id="username" placeholder="名前を入力">

            <div style="margin: 20px 0; padding: 10px; border: 1px dashed #3498db; border-radius: 8px;">
                <p style="font-weight: bold; margin-bottom: 10px;">診断の出題数を選択</p>
                <label><input type="radio" name="q-count" value="1"> 1問</label>
                <label><input type="radio" name="q-count" value="5"> 5問</label>
                <label><input type="radio" name="q-count" value="10" checked> 10問</label>
            </div>

            <p style="font-size: 0.8rem;">あなたの性格で当てはまるものにチェック</p>
            <div id="personality-list"></div>
            <button onclick="showSection('menu-page')">決定して戻る</button>
        </section>

        <section id="diagnosis-page" class="section hidden">
            <p id="q-number" style="font-weight: bold; color: #3498db;"></p>
            <h2 id="q-text">問題読み込み中...</h2>
            <p id="q-author" style="font-size: 0.8rem; color: gray; margin-bottom: 20px;"></p>
    
            <button id="btn-a" onclick="selectOption('A')" style="background-color: #e74c3c;"></button>
            <p>vs</p>
         <button id="btn-b" onclick="selectOption('B')" style="background-color: #2ecc71;"></button>

         <hr style="margin: 30px 0 15px 0; border: 0; border-top: 1px solid #eee;">
            <button onclick="showSection('menu-page')" style="background-color: #95a5a6; font-size: 0.8rem; width: auto; margin: 0 auto; padding: 8px 20px;">
                診断を中断してメニューに戻る
            </button>
        </section>

        <section id="result-page" class="section hidden">
            <h2>診断終了！</h2>
            <p id="total-result" style="font-weight: bold; font-size: 1.2rem;"></p>
            
            <button onclick="shareOnX()" style="background-color: #000; color: #fff; margin-bottom: 10px;">
                𝕏 で結果をシェアする
            </button>
            
            <hr>
            <div style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;">
                <ul id="result-list" style="text-align: left; font-size: 0.85rem; list-style: none; padding: 0;"></ul>
            </div>
            <canvas id="resultChart"></canvas>
            <button onclick="showSection('menu-page')">トップに戻る</button>
        </section>


        <div id="app-meta" aria-label="アプリ情報">
            <span id="app-version">v1.0.6</span>
            <span>最終更新: 2026-04-28</span>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/personalities');
                const ps = await res.json();
                const list = document.getElementById('personality-list');
                if (list) {
                    list.innerHTML = "";
                    ps.forEach(p => {
                        const label = document.createElement('label');
                        label.style.display = "block";
                        label.innerHTML = `<input type="checkbox" value="${p.id}" onchange="saveUserSettings()"> ${p.name}`;
                        list.appendChild(label);
                    });
                }
                loadUserSettings();
                document.getElementById('username').oninput = saveUserSettings;
                document.querySelectorAll('input[name="q-count"]').forEach(r => {
                    r.onchange = saveUserSettings;
                });
            } catch (e) {
                console.error("読み込みに失敗しました", e);
            }
        });
    </script>
</body>
</html>
